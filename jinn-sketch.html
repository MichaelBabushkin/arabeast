<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Arabeast — Jinn Character States</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:radial-gradient(ellipse at center,#1a0a3e 0%,#05020f 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      gap:48px;font-family:system-ui,sans-serif;padding:40px;flex-wrap:wrap;
    }
    .panel{display:flex;flex-direction:column;align-items:center;gap:12px}
    .label{color:#a78bfa;font-size:11px;letter-spacing:2px;text-transform:uppercase}
    .state-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;opacity:.8}

    /* ── universal float ── */
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

    /* ── blink ── */
    @keyframes blink{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(.07)}}

    /* ── magic particles ── */
    @keyframes md1{0%,100%{transform:translate(0,0);opacity:.9}50%{transform:translate(-6px,-18px);opacity:.1}}
    @keyframes md2{0%,100%{transform:translate(0,0);opacity:.7}50%{transform:translate(7px,-22px);opacity:.1}}
    @keyframes md3{0%,100%{transform:translate(0,0);opacity:.8}50%{transform:translate(-4px,-16px);opacity:.2}}
    @keyframes md4{0%,100%{transform:translate(0,0);opacity:.6}50%{transform:translate(5px,-14px);opacity:.1}}

    /* ── happy sparkle burst ── */
    @keyframes spark{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(2.8);opacity:.1}}

    /* ── SAD: body sobbing (slow gentle heave, no lateral shake) ── */
    @keyframes sob{
      0%,100%{transform:translateY(0)}
      30%    {transform:translateY(-6px)}
      55%    {transform:translateY(-6px)}
      80%    {transform:translateY(0)}
    }

    /* ── SAD: tears streaming (stroke-dashoffset flow) ── */
    @keyframes tear-flow{
      0%  {stroke-dashoffset:180;opacity:0}
      8%  {opacity:1}
      80% {opacity:.9}
      100%{stroke-dashoffset:0;opacity:0}
    }

    /* ── SAD: tear drops falling ── */
    @keyframes drop-fall{
      0%  {transform:translateY(0)   scale(.6);opacity:0}
      15% {opacity:1}
      80% {opacity:.8}
      100%{transform:translateY(52px) scale(1.3);opacity:0}
    }

    /* ── SAD: cry mouth wobble ── */
    @keyframes cry-wobble{
      0%,100%{transform:scaleX(1)   translateY(0)}
      30%    {transform:scaleX(1.05) translateY(2px)}
      60%    {transform:scaleX(.96)  translateY(0)}
    }

    /* ── TALKING: jaw open/close ── */
    @keyframes jaw{
      0%,100%{transform:translateY(0)}
      20%    {transform:translateY(13px)}
      40%    {transform:translateY(4px)}
      60%    {transform:translateY(11px)}
      80%    {transform:translateY(3px)}
    }

    /* ── TALKING: head bob ── */
    @keyframes head-bob{
      0%,100%{transform:rotate(0deg)}
      25%    {transform:rotate(-2deg)}
      75%    {transform:rotate(2deg)}
    }

    /* ── TALKING: speech wave ── */
    @keyframes speech-wave{
      0%  {transform:scaleX(0);opacity:0;transform-origin:left center}
      30% {opacity:.9}
      100%{transform:scaleX(1);opacity:0;transform-origin:left center}
    }

    /* ── TALKING: gesture hand (pointing up, gentle bob) ── */
    @keyframes hand-gesture{
      0%,100%{transform:translateY(0)}
      50%    {transform:translateY(-6px)}
    }

    .float      {animation:float 3.2s ease-in-out infinite;transform-origin:130px 210px}
    .sob-body   {animation:float 3.2s ease-in-out infinite,sob 1.8s ease-in-out infinite;transform-origin:130px 210px}
    .blink-g    {animation:blink 4.2s ease-in-out infinite;transform-origin:130px 84px}
    .md1{animation:md1 2.4s ease-in-out infinite}
    .md2{animation:md2 3.0s ease-in-out infinite}
    .md3{animation:md3 2.7s ease-in-out infinite}
    .md4{animation:md4 3.5s ease-in-out infinite}
    .spark-g{animation:spark 1.2s ease-in-out infinite}

    .tear-stream{
      stroke-dasharray:180;
      animation:tear-flow 1.4s ease-in infinite;
    }
    .tear-stream-2{animation-delay:.7s}
    .tear-stream-r{animation-delay:.35s}
    .tear-stream-r2{animation-delay:1.05s}

    .drop{animation:drop-fall 1.4s ease-in infinite}
    .drop-d1{animation-delay:.25s}
    .drop-d2{animation-delay:.8s}
    .drop-d3{animation-delay:1.1s}
    .drop-d4{animation-delay:.55s}

    .cry-mouth-g{animation:cry-wobble 1.8s ease-in-out infinite;transform-origin:130px 130px}

    .jaw-group{animation:jaw .55s ease-in-out infinite;transform-origin:130px 115px}
    .talking-head{animation:head-bob .55s ease-in-out infinite;transform-origin:130px 88px}
    .speech-w1{animation:speech-wave 1.1s ease-out infinite}
    .speech-w2{animation:speech-wave 1.1s ease-out infinite;animation-delay:.3s}
    .speech-w3{animation:speech-wave 1.1s ease-out infinite;animation-delay:.6s}
    .hand-bob{animation:hand-gesture 1.1s ease-in-out infinite}
  </style>
</head>
<body>
